{% extends "admin/base.html" %}

{% block title %}{{ title }} | Nexus Catalog Admin{% endblock %}

{% block extrahead %}
{{ block.super }}
<style>
    :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --surface: #ffffff;
        --page-bg: #f3f6fb;
        --text-main: #172033;
        --text-muted: #667085;
        --border: #d8dee9;
        --success: #059669;
    }

    body {
        background: var(--page-bg);
        color: var(--text-main);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #header {
        min-height: 64px;
        background: linear-gradient(135deg, #0f172a, #1d4ed8);
        color: #fff;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
    }

    #branding h1,
    #branding h1 a:link,
    #branding h1 a:visited {
        color: #fff;
        font-weight: 800;
        letter-spacing: 0;
    }

    #user-tools,
    #user-tools a {
        color: rgba(255, 255, 255, 0.88);
    }

    div.breadcrumbs {
        background: #e8eef8;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
    }

    div.breadcrumbs a {
        color: var(--primary-dark);
    }

    #content {
        padding: 28px 32px;
    }

    #content h1 {
        margin-bottom: 18px;
        color: var(--text-main);
        font-size: 1.55rem;
        font-weight: 800;
    }

    .module {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .module h2,
    .module caption,
    .inline-group h2 {
        padding: 13px 16px;
        background: #eef4ff;
        color: #1e3a8a;
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: 0;
    }

    table {
        border-collapse: collapse;
    }

    th,
    td {
        padding: 11px 12px;
        border-bottom: 1px solid #edf0f5;
        vertical-align: middle;
    }

    thead th {
        background: #f8fafc;
        color: var(--text-muted);
        font-weight: 700;
    }

    tbody tr:hover {
        background: #f8fbff;
    }

    a:link,
    a:visited {
        color: var(--primary-dark);
    }

    .button,
    input[type=submit],
    input[type=button],
    .submit-row input,
    a.button {
        border-radius: 8px;
        border: 0;
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        padding: 9px 14px;
    }

    .button:hover,
    input[type=submit]:hover,
    input[type=button]:hover,
    .submit-row input:hover,
    a.button:hover {
        background: var(--primary-dark);
    }

    .object-tools a:link,
    .object-tools a:visited {
        border-radius: 999px;
        background: var(--success);
        font-weight: 800;
    }

    .submit-row {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
    }

    input,
    textarea,
    select,
    .vTextField {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
    }

    input:focus,
    textarea:focus,
    select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        outline: none;
    }

    .form-row {
        padding: 14px 16px;
        border-bottom: 1px solid #edf0f5;
    }

    .aligned label {
        color: var(--text-muted);
        font-weight: 700;
    }

    .help,
    p.help,
    form p,
    .quiet {
        color: var(--text-muted);
    }

    #changelist {
        border-radius: 10px;
    }

    #changelist-filter {
        border-left: 1px solid var(--border);
        background: #f8fafc;
    }

    #changelist-filter h2 {
        background: #e8eef8;
        color: #1e3a8a;
        font-weight: 800;
    }

    .paginator {
        background: var(--surface);
        border-top: 1px solid var(--border);
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">Nexus Catalog Admin</a></h1>
{% endblock %}

{% block nav-global %}{% endblock %}
