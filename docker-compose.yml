services:
  neo4j:
    image: neo4j:5.12.0
    container_name: ecom_neo4j
    ports:
      - "7474:7474" # Browser interface
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  web:
    build: .
    container_name: ecom_django
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - GROQ_API_KEY=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
    depends_on:
      - neo4j
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  neo4j_data:
  neo4j_logs:
