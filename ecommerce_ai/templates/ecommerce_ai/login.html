{% extends "ecommerce_ai/auth_base.html" %}

{% block title %}Login - Nexus Store{% endblock %}

{% block content %}
<section class="panel">
    <h1>Login</h1>
    <p class="lead">Sign in with an account managed by the User Service.</p>
    <form method="post">
        {% csrf_token %}
        <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    </form>
    <p class="alt">No account yet? <a href="/register/">Create one</a></p>
</section>
{% endblock %}
