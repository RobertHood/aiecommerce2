<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus Store{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.72);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --success: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            color: var(--text-light);
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.13) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.13) 0, transparent 50%);
            background-attachment: fixed;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            padding: 0 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            z-index: 100;
        }
        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 1.4rem; align-items: center; }
        .nav-links a { color: var(--text-light); text-decoration: none; font-weight: 500; }
        .cart-link { position: relative; }
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -10px;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.65rem;
            font-weight: 700;
            color: #fff;
            background: var(--primary);
        }
        main { max-width: 960px; margin: 0 auto; padding: 110px 5% 60px; }
        .panel {
            max-width: 560px;
            margin: 0 auto;
            padding: 2rem;
            border-radius: 18px;
            border: 1px solid var(--border-light);
            background: var(--bg-card);
            backdrop-filter: blur(10px);
        }
        h1 { margin-bottom: 0.7rem; font-size: 2rem; }
        .lead { margin-bottom: 1.6rem; color: var(--text-muted); line-height: 1.6; }
        .field { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1rem; }
        label { color: var(--text-muted); font-size: 0.9rem; }
        input {
            padding: 0.9rem 1rem;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            outline: none;
            color: #fff;
            background: rgba(15, 23, 42, 0.75);
        }
        .btn {
            width: 100%;
            margin-top: 0.5rem;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            background: var(--primary);
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn:hover { background: var(--primary-hover); }
        .alt { margin-top: 1rem; color: var(--text-muted); text-align: center; }
        .alt a { color: var(--text-light); font-weight: 600; }
        .messages { margin-bottom: 1rem; display: grid; gap: 0.6rem; }
        .message { padding: 0.85rem 1rem; border-radius: 10px; border: 1px solid var(--border-light); background: rgba(255, 255, 255, 0.06); }
        .profile-grid { display: grid; gap: 0.8rem; margin-top: 1.5rem; }
        .profile-row { display: flex; justify-content: space-between; gap: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .profile-row span:first-child { color: var(--text-muted); }
    </style>
</head>
<body>
<nav>
    <a href="/" class="brand"><i class="fa-solid fa-cube"></i> Nexus Store</a>
    <div class="nav-links">
        <a href="/">Shop</a>
        <a href="/cart/" class="cart-link">
            <i class="fa-solid fa-cart-shopping"></i> Cart
            <span class="cart-badge" {% if not cart_count %}style="display:none"{% endif %}>{{ cart_count }}</span>
        </a>
        {% if customer %}
            <a href="/account/"><i class="fa-solid fa-user"></i> {{ customer.full_name }}</a>
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/login/">Login</a>
        {% endif %}
    </div>
</nav>
<main>
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="message">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
